<style>
/* ====== Hide old desktop grid entirely ====== */
.reels-feed{display:none!important}

/* ====== SNAP-SCROLL FEED (shared mobile + desktop) ====== */
#reelsMobileFeed{
  display:flex!important;
  flex-direction:column;
  align-items:center;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  height:100%;
  padding:0;
  gap:0;
}
#reelsMobileFeed::-webkit-scrollbar{display:none}

/* ====== SNAP CARD (base — overridden per breakpoint) ====== */
.reel-mob-card{
  position:relative;
  background:#000;
  overflow:hidden;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  flex-shrink:0;
  width:min(420px,100%);
  border-radius:16px;
}

/* Video fills the full card */
.reel-mob-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  max-height:none;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}
.reel-mob-video video{
  width:100%;
  height:100%;
  object-fit:cover;
  max-height:none;
}

/* Top overlay — user info */
.reel-mob-header{
  position:absolute;
  top:0;left:0;right:0;
  background:linear-gradient(180deg,rgba(0,0,0,.62) 0%,transparent 100%);
  color:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  padding:18px 16px 32px;
  z-index:3;
}
.reel-mob-avatar{
  width:36px;height:36px;border-radius:50%;
  overflow:hidden;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.8rem;flex-shrink:0;
  border:2px solid rgba(255,255,255,.7);
  color:#fff;
}
.reel-mob-avatar img{width:100%;height:100%;object-fit:cover}

/* Bottom overlay — action buttons */
.reel-mob-actions{
  position:absolute;
  bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(0,0,0,.62) 0%,transparent 100%);
  display:flex;
  align-items:center;
  gap:8px;
  padding:32px 14px 20px;
  z-index:3;
}
.reel-mob-act{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
  backdrop-filter:blur(6px);
  cursor:pointer;
  display:flex;align-items:center;gap:5px;
  font-size:.82rem;font-weight:700;
  color:#fff;
  padding:8px 14px;
  border-radius:20px;
  transition:all .2s;
}
.reel-mob-act:hover{background:rgba(255,255,255,.3)}
.reel-mob-act.liked{color:#FF6B6B;border-color:#FF6B6B}
.reel-mob-act svg{width:18px;height:18px}

/* Comments panel — slides up from bottom */
.reel-mob-comments{
  position:absolute;
  bottom:58px;left:0;right:0;
  max-height:40%;
  overflow-y:auto;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(10px);
  padding:0 14px;
  display:none;
  flex-direction:column;
  gap:8px;
  z-index:4;
  scrollbar-width:none;
}
.reel-mob-comments::-webkit-scrollbar{display:none}
.reel-mob-comments.open{display:flex;padding:12px 14px}
.reel-mob-comment-row{display:flex;gap:8px;align-items:flex-start}
.reel-mob-c-avatar{
  width:26px;height:26px;border-radius:50%;overflow:hidden;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.6rem;flex-shrink:0;
  border:1px solid rgba(255,255,255,.3);color:#fff;
}
.reel-mob-c-avatar img{width:100%;height:100%;object-fit:cover}
.reel-mob-c-bubble{background:rgba(255,255,255,.1);border-radius:12px;padding:6px 10px;flex:1;min-width:0}
.reel-mob-c-user{font-size:.7rem;font-weight:700;color:#fff}
.reel-mob-c-text{font-size:.78rem;color:rgba(255,255,255,.9);line-height:1.4;word-break:break-word}

/* Comment input row */
.reel-mob-input-row{
  position:absolute;
  bottom:0;left:0;right:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(10px);
  display:none;
  gap:8px;
  padding:10px 14px 16px;
  z-index:5;
}
.reel-mob-input{
  flex:1;padding:9px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.12);
  font-size:.8rem;font-family:'Plus Jakarta Sans',sans-serif;
  outline:none;color:#fff;
}
.reel-mob-input::placeholder{color:rgba(255,255,255,.5)}
.reel-mob-input:focus{border-color:rgba(255,255,255,.6)}
.reel-mob-send{
  width:34px;height:34px;border-radius:50%;
  background:#fff;border:none;cursor:pointer;
  color:#000;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.reel-mob-send:hover{transform:scale(1.1)}

/* ====== MOBILE: full-screen snap ====== */
@media(max-width:980px){
  #section-reels{padding:0!important;overflow:hidden!important}
  #reels-section-header{
    position:absolute;
    top:0;left:0;right:0;
    z-index:10;
    padding:14px 16px;
    background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,transparent 100%);
    display:flex;justify-content:space-between;align-items:center;
  }
  #reels-section-header .section-title{color:#fff;margin:0}
  .reel-mob-card{width:100%;height:100dvh;border-radius:0}
}

/* ====== DESKTOP: centered snap column ====== */
@media(min-width:981px){
  #section-reels{overflow:hidden;padding:0}
  #reels-section-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
  #reelsMobileFeed{
    height:calc(100vh - var(--header-height) - 52px);
  }
  .reel-mob-card{
    width:min(420px,90%);
    height:calc(100vh - var(--header-height) - 52px);
  }
}

/* ====== Reel Detail Overlay ====== */
.reel-detail-overlay{display:none;position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);align-items:center;justify-content:center}
.reel-detail-overlay.active{display:flex}
.reel-detail-wrap{display:flex;width:min(900px,95vw);height:min(600px,90vh);border-radius:32px;overflow:hidden;box-shadow:var(--shadow-lg)}
.reel-detail-video{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative;min-width:0}
.reel-detail-video video{max-width:100%;max-height:100%;object-fit:contain}
.reel-detail-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.3rem;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:5}
.reel-detail-close:hover{background:rgba(255,255,255,.3)}
.reel-detail-panel{width:320px;background:var(--white);display:flex;flex-direction:column;flex-shrink:0}
.rdp-header{padding:16px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:10px}
.rdp-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--ivory);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;border:2px solid var(--sand);flex-shrink:0}
.rdp-avatar img{width:100%;height:100%;object-fit:cover}
.rdp-likes{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--glass-border)}
.rdp-likes button{background:none;border:none;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:10px;transition:all .2s}
.rdp-likes button.liked{color:#FF3B30}
.rdp-likes button:hover{background:var(--ivory)}
.rdp-comments{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.rdp-comment{display:flex;gap:8px;align-items:flex-start}
.rdp-comment-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;background:var(--ivory);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.65rem;flex-shrink:0;border:1px solid var(--sand)}
.rdp-comment-avatar img{width:100%;height:100%;object-fit:cover}
.rdp-comment-bubble{background:var(--ivory);border-radius:14px;padding:7px 12px;min-width:0;flex:1}
.rdp-comment-username{font-size:.72rem;font-weight:700;color:var(--charcoal)}
.rdp-comment-text{font-size:.8rem;color:var(--charcoal);line-height:1.4;word-break:break-word}
.rdp-comment-time{font-size:.62rem;color:var(--muted);margin-top:2px}
.rdp-input-row{padding:10px 14px;border-top:1px solid var(--glass-border);display:flex;gap:8px;align-items:center}
.rdp-input{flex:1;padding:9px 14px;border-radius:20px;border:1px solid var(--glass-border);background:var(--ivory);font-size:.82rem;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:all .2s}
.rdp-input:focus{border-color:var(--sand);box-shadow:0 0 0 3px rgba(225,217,188,.3)}
.rdp-send-btn{width:36px;height:36px;border-radius:50%;background:var(--charcoal);border:none;cursor:pointer;color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.rdp-send-btn:hover{transform:scale(1.1);box-shadow:var(--shadow-md)}
@media(max-width:980px){
  .reel-detail-wrap{flex-direction:column;width:100vw;height:100svh;border-radius:0}
  .reel-detail-panel{width:100%;height:280px;flex-shrink:0}
  .reel-detail-video{flex:1;height:auto}
}
</style>

<!-- ====== SECTION: REELS ====== -->
<div class="page-section" id="section-reels">
  <div id="reels-section-header">
    <div class="section-title" style="margin:0">Reels</div>
    <button class="upload-section-btn" onclick="triggerUpload('reel')">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Upload
    </button>
  </div>
  <div class="reels-feed" id="reelsFeed"></div>
  <div id="reelsMobileFeed"></div>
</div>

<!-- ====== REEL DETAIL OVERLAY (Desktop side-panel / Mobile stacked) ====== -->
<div class="reel-detail-overlay" id="reelDetailOverlay">
  <div class="reel-detail-wrap">
    <div class="reel-detail-video" id="reelDetailVideoWrap">
      <video id="reelDetailVideo" controls playsinline style="width:100%;height:100%;object-fit:contain;max-height:100%"></video>
      <button class="reel-detail-close" onclick="closeReelDetail()">✕</button>
    </div>
    <div class="reel-detail-panel">
      <div class="rdp-header">
        <div class="rdp-avatar" id="rdpAvatar"></div>
        <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.9rem" id="rdpUsername"></div><div style="font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="rdpCaption"></div></div>
      </div>
      <div class="rdp-likes">
        <button id="rdpLikeBtn" onclick="toggleReelLikeDetail()">🤍 <span id="rdpLikeCount">0</span></button>
      </div>
      <div class="rdp-comments" id="rdpCommentsList"></div>
      <div class="rdp-input-row">
        <input class="rdp-input" id="rdpCommentInput" placeholder="Add a comment..." maxlength="500">
        <button class="rdp-send-btn" onclick="submitReelComment()">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
let reelsData = [];
let currentReelDetail = null;

function pfpFor(r) {
  return (r.profile_pic && r.profile_pic !== 'default_profile.png')
    ? '<img src="/static/uploads/' + r.profile_pic + '">'
    : '<img src="/static/Images/profile.png">';
}

function escHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

async function loadReels() {
  try {
    const res = await fetch('/api/reels');
    reelsData = await res.json();
    const feed = document.getElementById('reelsFeed');
    const mobileFeed = document.getElementById('reelsMobileFeed');
    if (!reelsData.length) {
      const empty = '<div class="empty-state"><div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="2" y1="17" x2="7" y2="17"/></svg></div><h3>No reels yet</h3><p>Be the first to share a short video!</p></div>';
      feed.innerHTML = empty;
      mobileFeed.innerHTML = empty;
      return;
    }
    feed.innerHTML = '';
    reelsData.forEach((r, idx) => {
      const card = document.createElement('div'); card.className = 'reel-card';
      card.onclick = () => openReelDetail(idx);
      card.innerHTML = '<div class="reel-video"><video src="' + r.video_url + '" preload="metadata" playsinline muted></video>'
        + '<div class="reel-play-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>'
        + '<div class="reel-info"><div class="reel-user-avatar">' + pfpFor(r) + '</div>'
        + '<div class="reel-meta"><div class="reel-username">' + r.username + '</div>'
        + '<div class="reel-caption">' + escHtml(r.caption || '') + '</div>'
        + '<div class="reel-time">' + getTimeAgo(new Date(r.created_at)) + '</div></div>'
        + '<div class="reel-actions">'
        + '<button class="reel-action-btn ' + (r.liked_by_me ? 'liked' : '') + '" onclick="event.stopPropagation();toggleReelLike(' + r.id + ',this)">'
        + (r.liked_by_me ? '❤️' : '🤍') + ' <span>' + r.like_count + '</span></button>'
        + '<button class="reel-action-btn" onclick="event.stopPropagation();openReelDetail(' + idx + ')">💬</button>'
        + (r.user_id === myId ? '<button class="reel-action-btn" onclick="event.stopPropagation();deleteReel(' + r.id + ')" title="Delete">🗑</button>' : '')
        + '</div></div>';
      feed.appendChild(card);
    });
    mobileFeed.innerHTML = '';
    reelsData.forEach((r, idx) => {
      const card = document.createElement('div'); card.className = 'reel-mob-card'; card.id = 'rmob-' + idx;
      card.innerHTML =
        // 1. Video — full-background layer
        '<div class="reel-mob-video"><video src="' + r.video_url + '" playsinline preload="metadata" loop></video></div>'
        // 2. Top overlay — user info
        + '<div class="reel-mob-header">'
        + '<div class="reel-mob-avatar">' + pfpFor(r) + '</div>'
        + '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.85rem;color:inherit">' + r.username + '</div>'
        + '<div style="font-size:.7rem;color:rgba(255,255,255,.7)">' + getTimeAgo(new Date(r.created_at)) + '</div></div>'
        + (r.user_id === myId ? '<button class="reel-mob-act" onclick="deleteReel(' + r.id + ')">🗑</button>' : '')
        + '</div>'
        // 3. Bottom overlay — action buttons
        + '<div class="reel-mob-actions">'
        + '<button class="reel-mob-act ' + (r.liked_by_me ? 'liked' : '') + '" id="rmob-like-' + idx + '" onclick="mobReelLike(' + idx + ')">'
        + '<svg viewBox="0 0 24 24" fill="' + (r.liked_by_me ? '#FF6B6B' : 'currentColor') + '"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'
        + ' <span id="rmob-lc-' + idx + '">' + r.like_count + '</span></button>'
        + '<button class="reel-mob-act" onclick="toggleMobComments(' + idx + ')">'
        + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>'
        + ' Comments</button>'
        + '</div>'
        // 4. Comments panel
        + '<div class="reel-mob-comments" id="rmob-cmts-' + idx + '"></div>'
        // 5. Comment input
        + '<div class="reel-mob-input-row" id="rmob-input-row-' + idx + '">'
        + '<input class="reel-mob-input" id="rmob-input-' + idx + '" placeholder="Add a comment..." maxlength="500">'
        + '<button class="reel-mob-send" onclick="mobReelComment(' + idx + ', ' + r.id + ')">'
        + '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>'
        + '</button></div>';
      mobileFeed.appendChild(card);
    });

    // Auto-play video when snapped into view
    if (typeof IntersectionObserver !== 'undefined') {
      const snapObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const vid = entry.target.querySelector('.reel-mob-video video');
          if (!vid) return;
          if (entry.isIntersecting) { vid.play().catch(() => {}); }
          else { vid.pause(); }
        });
      }, { root: mobileFeed, threshold: 0.6 });
      document.querySelectorAll('#reelsMobileFeed .reel-mob-card').forEach(c => snapObserver.observe(c));
    }
  } catch (e) {}
}

async function mobReelLike(idx) {
  const r = reelsData[idx]; if (!r) return;
  try {
    const res = await fetch('/api/reel/' + r.id + '/like', { method: 'POST' });
    const data = await res.json();
    r.liked_by_me = data.liked; r.like_count = data.count;
    const btn = document.getElementById('rmob-like-' + idx);
    if (btn) {
      btn.classList.toggle('liked', data.liked);
      btn.querySelector('svg').setAttribute('fill', data.liked ? '#FF3B30' : 'currentColor');
      btn.querySelector('span').textContent = data.count;
    }
  } catch (e) {}
}

async function toggleMobComments(idx) {
  const cmts = document.getElementById('rmob-cmts-' + idx);
  const inputRow = document.getElementById('rmob-input-row-' + idx);
  const isOpen = cmts.classList.contains('open');
  if (isOpen) {
    cmts.classList.remove('open');
    inputRow.style.display = 'none';
    return;
  }
  cmts.classList.add('open');
  inputRow.style.display = 'flex';
  const r = reelsData[idx]; if (!r) return;
  cmts.innerHTML = '<div style="font-size:.75rem;color:var(--muted);padding:4px 0">Loading...</div>';
  try {
    const res = await fetch('/api/reel/' + r.id + '/comments');
    const list = await res.json();
    cmts.innerHTML = '';
    if (!list.length) { cmts.innerHTML = '<div style="font-size:.75rem;color:var(--muted)">No comments yet</div>'; return; }
    list.forEach(c => {
      const row = document.createElement('div'); row.className = 'reel-mob-comment-row';
      const pfp2 = (c.profile_pic && c.profile_pic !== 'default_profile.png')
        ? '<img src="/static/uploads/' + c.profile_pic + '">' : '<img src="/static/Images/profile.png">';
      row.innerHTML = '<div class="reel-mob-c-avatar">' + pfp2 + '</div>'
        + '<div class="reel-mob-c-bubble"><div class="reel-mob-c-user">' + c.username + '</div>'
        + '<div class="reel-mob-c-text">' + escHtml(c.comment) + '</div></div>';
      cmts.appendChild(row);
    });
  } catch (e) { cmts.innerHTML = '<div style="font-size:.75rem;color:var(--muted)">Could not load comments</div>'; }
}

async function mobReelComment(idx, reelId) {
  const input = document.getElementById('rmob-input-' + idx); if (!input) return;
  const text = input.value.trim(); if (!text) return;
  try {
    const res = await fetch('/api/reel/' + reelId + '/comments', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({comment: text})
    });
    const data = await res.json();
    if (data.success) {
      input.value = '';
      const cmts = document.getElementById('rmob-cmts-' + idx);
      const row = document.createElement('div'); row.className = 'reel-mob-comment-row';
      row.innerHTML = '<div class="reel-mob-c-avatar">' + (data.username||'?').charAt(0).toUpperCase() + '</div>'
        + '<div class="reel-mob-c-bubble"><div class="reel-mob-c-user">' + data.username + '</div>'
        + '<div class="reel-mob-c-text">' + escHtml(text) + '</div></div>';
      cmts.appendChild(row);
      cmts.scrollTop = cmts.scrollHeight;
    }
  } catch (e) {}
}

async function toggleReelLike(reelId, btn) {
  try {
    const res = await fetch('/api/reel/' + reelId + '/like', { method: 'POST' });
    const data = await res.json();
    btn.classList.toggle('liked', data.liked);
    btn.innerHTML = (data.liked ? '❤️' : '🤍') + ' <span>' + data.count + '</span>';
    const r = reelsData.find(x => x.id === reelId);
    if (r) { r.liked_by_me = data.liked; r.like_count = data.count; }
    if (currentReelDetail && currentReelDetail.id === reelId) {
      const lb = document.getElementById('rdpLikeBtn');
      if (lb) { lb.classList.toggle('liked', data.liked); lb.innerHTML = (data.liked ? '❤️' : '🤍') + ' <span>' + data.count + '</span>'; }
    }
  } catch (e) {}
}

async function deleteReel(reelId) {
  if (!confirm('Delete this reel?')) return;
  try { await fetch('/api/reel/' + reelId, { method: 'DELETE' }); loadReels(); closeReelDetail(); } catch (e) {}
}

async function openReelDetail(idx) {
  const r = reelsData[idx]; if (!r) return;
  currentReelDetail = r;
  const overlay = document.getElementById('reelDetailOverlay');
  const vid = document.getElementById('reelDetailVideo');
  vid.src = r.video_url; vid.play().catch(()=>{});
  document.getElementById('rdpAvatar').innerHTML = pfpFor(r);
  document.getElementById('rdpUsername').textContent = r.username;
  document.getElementById('rdpCaption').textContent = r.caption || '';
  const lb = document.getElementById('rdpLikeBtn');
  lb.classList.toggle('liked', !!r.liked_by_me);
  lb.innerHTML = (r.liked_by_me ? '❤️' : '🤍') + ' <span>' + r.like_count + '</span>';
  document.getElementById('rdpCommentsList').innerHTML = '<div style="font-size:.75rem;color:var(--muted);padding:8px">Loading comments…</div>';
  overlay.classList.add('active');
  try {
    const res = await fetch('/api/reel/' + r.id + '/comments');
    const comments = await res.json();
    renderDetailComments(comments);
  } catch (e) {}
}

function renderDetailComments(comments) {
  const list = document.getElementById('rdpCommentsList');
  list.innerHTML = '';
  if (!comments.length) { list.innerHTML = '<div style="font-size:.78rem;color:var(--muted);padding:8px">No comments yet — be the first!</div>'; return; }
  comments.forEach(c => {
    const row = document.createElement('div'); row.className = 'rdp-comment';
    const pfp2 = (c.profile_pic && c.profile_pic !== 'default_profile.png')
      ? '<img src="/static/uploads/' + c.profile_pic + '">' : '<img src="/static/Images/profile.png">';
    row.innerHTML = '<div class="rdp-comment-avatar">' + pfp2 + '</div>'
      + '<div class="rdp-comment-bubble">'
      + '<div class="rdp-comment-username">' + c.username + '</div>'
      + '<div class="rdp-comment-text">' + escHtml(c.comment) + '</div>'
      + '<div class="rdp-comment-time">' + getTimeAgo(new Date(c.created_at)) + '</div>'
      + '</div>';
    list.appendChild(row);
  });
  list.scrollTop = list.scrollHeight;
}

function closeReelDetail() {
  const vid = document.getElementById('reelDetailVideo');
  if (vid) { vid.pause(); vid.src = ''; }
  document.getElementById('reelDetailOverlay').classList.remove('active');
  currentReelDetail = null;
}

async function toggleReelLikeDetail() {
  if (!currentReelDetail) return;
  try {
    const res = await fetch('/api/reel/' + currentReelDetail.id + '/like', { method: 'POST' });
    const data = await res.json();
    currentReelDetail.liked_by_me = data.liked;
    currentReelDetail.like_count = data.count;
    const lb = document.getElementById('rdpLikeBtn');
    lb.classList.toggle('liked', data.liked);
    lb.innerHTML = (data.liked ? '❤️' : '🤍') + ' <span>' + data.count + '</span>';
    const r = reelsData.find(x => x.id === currentReelDetail.id);
    if (r) { r.liked_by_me = data.liked; r.like_count = data.count; }
  } catch (e) {}
}

async function submitReelComment() {
  if (!currentReelDetail) return;
  const input = document.getElementById('rdpCommentInput');
  const text = input.value.trim(); if (!text) return;
  try {
    const res = await fetch('/api/reel/' + currentReelDetail.id + '/comments', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({comment: text})
    });
    const data = await res.json();
    if (data.success) {
      input.value = '';
      const list = document.getElementById('rdpCommentsList');
      const row = document.createElement('div'); row.className = 'rdp-comment';
      row.innerHTML = '<div class="rdp-comment-avatar">' + (data.username||'?').charAt(0).toUpperCase() + '</div>'
        + '<div class="rdp-comment-bubble">'
        + '<div class="rdp-comment-username">' + data.username + '</div>'
        + '<div class="rdp-comment-text">' + escHtml(text) + '</div>'
        + '<div class="rdp-comment-time">just now</div></div>';
      if (list.querySelector('div[style]')) list.innerHTML = '';
      list.appendChild(row);
      list.scrollTop = list.scrollHeight;
    }
  } catch (e) {}
}

document.getElementById('rdpCommentInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitReelComment(); }
});
document.getElementById('reelDetailOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('reelDetailOverlay')) closeReelDetail();
});
</script>
