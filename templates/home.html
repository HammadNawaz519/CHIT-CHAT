<style>
/* FEED SECTION */
.feed-list{display:flex;flex-direction:column;gap:24px;padding:0 16px 40px;max-width:680px;margin:0 auto}
.feed-post{background:var(--white);border-radius:var(--card-radius);border:1px solid var(--glass-border);box-shadow:var(--shadow-sm);overflow:hidden;transition:all .3s}
.feed-post-header{display:flex;align-items:center;gap:12px;padding:16px 20px 12px}
.feed-post-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;background:var(--ivory);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0;border:2px solid var(--sand)}
.feed-post-avatar img{width:100%;height:100%;object-fit:cover}
.feed-post-user{flex:1;min-width:0}
.feed-post-username{font-weight:700;font-size:.9rem;color:var(--charcoal)}
.feed-post-time{font-size:.7rem;color:var(--muted)}
.feed-post-media{width:100%;max-height:480px;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
.feed-post-media img{width:100%;max-height:480px;object-fit:cover}
.feed-post-media video{width:100%;max-height:480px;object-fit:cover}
.feed-post-body{padding:12px 20px 16px}
.feed-post-caption{font-size:.9rem;color:var(--charcoal);line-height:1.5;margin-bottom:8px}
.feed-post-actions{display:flex;align-items:center;gap:12px;margin-top:8px}
.feed-act-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:.82rem;color:var(--muted);font-weight:600;padding:7px 12px;border-radius:14px;transition:all .2s}
.feed-act-btn:hover{background:var(--ivory);color:var(--charcoal)}
.feed-act-btn.liked{color:#FF3B30}
.feed-act-btn svg{width:18px;height:18px}
.feed-empty{text-align:center;padding:80px 24px;color:var(--muted)}
.feed-empty-icon{font-size:3rem;margin-bottom:12px}
@media(min-width:981px){ #section-feed .feed-list{max-width:540px} }
</style>

<!-- ====== SECTION: FEED / HOME ====== -->
<div class="page-section" id="section-feed">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 16px">
    <div class="section-title" style="margin:0">Feed</div>
  </div>
  <div class="feed-list" id="feedList"></div>
</div>

<script>
async function loadFeed() {
  const list = document.getElementById('feedList');
  list.innerHTML = '<div class="feed-empty"><div class="feed-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><p>Loading...</p></div>';
  try {
    const [statusRes, reelRes] = await Promise.all([
      fetch('/api/statuses'),
      fetch('/api/reels')
    ]);
    const statuses = await statusRes.json();
    const reels = await reelRes.json();
    const posts = [];
    statuses.forEach(group => {
      group.statuses.forEach(s => {
        posts.push({
          type: 'status', id: s.id, user_id: group.user_id,
          username: group.username, profile_pic: group.profile_pic,
          media_url: s.media_url, media_type: s.media_type,
          caption: s.caption, created_at: s.created_at,
          like_count: 0, liked_by_me: false
        });
      });
    });
    reels.forEach(r => {
      posts.push({
        type: 'reel', id: r.id, user_id: r.user_id,
        username: r.username, profile_pic: r.profile_pic,
        media_url: r.video_url, media_type: 'video',
        caption: r.caption, created_at: r.created_at,
        like_count: r.like_count, liked_by_me: r.liked_by_me, reel_idx: reels.indexOf(r)
      });
    });
    posts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    list.innerHTML = '';
    if (!posts.length) {
      list.innerHTML = '<div class="feed-empty"><div class="feed-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><h3>Nothing yet</h3><p>Posts from your contacts will appear here.</p></div>';
      return;
    }
    posts.forEach(p => {
      const pfp2 = (p.profile_pic && p.profile_pic !== 'default_profile.png')
        ? '<img src="/static/uploads/' + p.profile_pic + '">'
        : '<img src="/static/Images/profile.png">';
      const post = document.createElement('div'); post.className = 'feed-post';
      let mediaHtml = '';
      if (p.media_type === 'video') {
        mediaHtml = '<div class="feed-post-media"><video src="' + p.media_url + '" controls playsinline preload="metadata" style="width:100%;max-height:480px;object-fit:cover"></video></div>';
      } else if (p.media_type === 'image') {
        mediaHtml = '<div class="feed-post-media"><img src="' + p.media_url + '" loading="lazy"></div>';
      }
      const likeId = 'feedlike-' + p.type + '-' + p.id;
      post.innerHTML = '<div class="feed-post-header">'
        + '<div class="feed-post-avatar">' + pfp2 + '</div>'
        + '<div class="feed-post-user"><div class="feed-post-username">' + p.username + '</div>'
        + '<div class="feed-post-time">' + getTimeAgo(new Date(p.created_at)) + (p.type === 'reel' ? ' · Reel' : ' · Status') + '</div></div>'
        + '</div>'
        + mediaHtml
        + '<div class="feed-post-body">'
        + (p.caption ? '<div class="feed-post-caption">' + escHtml(p.caption) + '</div>' : '')
        + '<div class="feed-post-actions">';
      if (p.type === 'reel') {
        post.innerHTML += '<button class="feed-act-btn ' + (p.liked_by_me ? 'liked' : '') + '" id="' + likeId + '" onclick="feedReelLike(' + p.id + ',\'' + likeId + '\',this)">'
          + '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="' + (p.liked_by_me ? '#FF3B30' : 'none') + '" stroke="currentColor" stroke-width="2"/></svg>'
          + ' ' + p.like_count + '</button>';
        if (p.reel_idx !== undefined) {
          post.innerHTML += '<button class="feed-act-btn" onclick="switchSection(\'reels\')">' 
            + '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>'
            + ' View Reel</button>';
        }
      }
      post.innerHTML += '</div></div>';
      list.appendChild(post);
    });
  } catch (e) {
    list.innerHTML = '<div class="feed-empty"><div class="feed-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><circle cx="12" cy="12" r="10"/><line x1="8" y1="15" x2="16" y2="15"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div><p>Could not load feed</p></div>';
  }
}

async function feedReelLike(reelId, btnId, btn) {
  try {
    const res = await fetch('/api/reel/' + reelId + '/like', { method: 'POST' });
    const data = await res.json();
    btn.classList.toggle('liked', data.liked);
    btn.querySelector('svg path').setAttribute('fill', data.liked ? '#FF3B30' : 'none');
    btn.childNodes[btn.childNodes.length - 1].textContent = ' ' + data.count;

    if (r) { r.liked_by_me = data.liked; r.like_count = data.count; }
  } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  if (window.innerWidth <= 980) {
    setTimeout(() => switchSection('feed'), 0);
  }
});
</script>
